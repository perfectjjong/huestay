<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hue Stay Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FDFAF5; --sand: #F5ECD7; --gold: #E8C896;
      --terra: #C4714A; --terra-dark: #A85B38;
      --brown: #3D2B1F; --brown-light: #8C6B57;
      --shadow: rgba(61,43,31,.10);
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }
    header {
      background: var(--brown); color: #fff; padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1rem; font-weight: 600; }
    header a { color: var(--gold); font-size: .82rem; text-decoration: none; }

    /* LOGIN */
    .login-wrap { max-width: 360px; margin: 6rem auto; padding: 2rem; background: #fff; border-radius: 16px; box-shadow: 0 5px 30px var(--shadow); }
    .login-wrap h2 { font-size: 1.05rem; margin-bottom: 1.2rem; }
    .login-wrap input { width: 100%; padding: .7rem 1rem; border: 1.5px solid var(--gold); border-radius: 8px; font-size: .9rem; font-family: inherit; outline: none; }
    .login-wrap input:focus { border-color: var(--terra); }
    .btn-login { display: block; width: 100%; margin-top: .8rem; padding: .75rem; background: var(--terra); color: #fff; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-login:hover { background: var(--terra-dark); }
    .err { color: #DC2626; font-size: .8rem; margin-top: .5rem; }

    /* TABS */
    .tab-nav { background: var(--sand); border-bottom: 2px solid var(--gold); display: flex; gap: 0; }
    .tab-btn { padding: .75rem 1.5rem; border: none; background: transparent; font-family: inherit; font-size: .88rem; font-weight: 500; color: var(--brown-light); cursor: pointer; transition: background .15s, color .15s; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: var(--terra); border-bottom-color: var(--terra); background: var(--cream); font-weight: 700; }
    .tab-btn:hover:not(.active) { background: rgba(0,0,0,.04); }

    /* CONTAINER */
    .container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1.2rem 4rem; }

    /* STATS */
    .stats { display: flex; gap: .8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat { background: #fff; border-radius: 10px; padding: .7rem 1.1rem; box-shadow: 0 2px 10px var(--shadow); }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--terra); }
    .stat-label { font-size: .72rem; color: var(--brown-light); }
    .refresh-btn { margin-left: auto; padding: .45rem 1rem; border: 1.5px solid var(--gold); background: transparent; border-radius: 8px; font-size: .78rem; cursor: pointer; font-family: inherit; color: var(--brown); }
    .refresh-btn:hover { background: var(--sand); }

    /* INQUIRY CARDS */
    .card {
      background: #fff; border-radius: 14px; margin-bottom: 1rem;
      box-shadow: 0 2px 14px var(--shadow); overflow: hidden;
    }
    .card-head {
      padding: .9rem 1.2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: .8rem;
      cursor: pointer; user-select: none;
    }
    .card-head:hover { background: var(--cream); }
    .card-subject { font-weight: 600; font-size: .95rem; }
    .card-meta { font-size: .75rem; color: var(--brown-light); margin-top: .2rem; }
    .card-right { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
    .badge-priv { background: #F3F4F6; color: #374151; font-size: .68rem; padding: .15rem .5rem; border-radius: 5px; }
    .badge-pub  { background: #D1FAE5; color: #065F46; font-size: .68rem; padding: .15rem .5rem; border-radius: 5px; }
    .badge-replied { background: #DBEAFE; color: #1E40AF; font-size: .68rem; padding: .15rem .5rem; border-radius: 5px; }
    .chevron { font-size: .8rem; color: var(--brown-light); transition: transform .2s; }
    .card.open .chevron { transform: rotate(180deg); }
    .card-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--sand); }
    .card.open .card-body { display: block; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem .8rem; margin: .8rem 0 1rem; }
    .info-row { font-size: .8rem; }
    .info-label { font-weight: 600; color: var(--brown-light); font-size: .72rem; }
    .msg-box { background: var(--cream); border-radius: 8px; padding: .75rem 1rem; font-size: .85rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; margin-bottom: 1rem; }
    .reply-section { border-top: 1px dashed var(--gold); padding-top: .9rem; }
    .reply-section label { font-size: .78rem; font-weight: 600; color: var(--brown-light); display: block; margin-bottom: .4rem; }
    .reply-section textarea { width: 100%; padding: .7rem .9rem; border: 1.5px solid var(--gold); border-radius: 8px; font-family: inherit; font-size: .85rem; resize: vertical; min-height: 80px; outline: none; }
    .reply-section textarea:focus { border-color: var(--terra); }
    .reply-actions { display: flex; align-items: center; gap: .6rem; margin-top: .6rem; flex-wrap: wrap; }
    .btn-save { padding: .5rem 1.2rem; background: var(--terra); color: #fff; border: none; border-radius: 8px; font-size: .83rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-save:hover { background: var(--terra-dark); }
    .btn-save:disabled { opacity: .55; cursor: default; }
    .reply-opt-label { font-size: .75rem; color: var(--brown-light); margin-left: auto; }
    .reply-btns { display: flex; gap: .4rem; }
    .reply-btn { display: inline-flex; align-items: center; gap: .3rem; padding: .38rem .75rem; border-radius: 7px; text-decoration: none; font-size: .75rem; font-weight: 600; }
    .reply-ka { background: #FEE500; color: #3A1D1D; }
    .reply-wa { background: #25D366; color: #fff; }
    .save-msg { font-size: .75rem; color: #16A34A; }

    /* SPACES ADMIN */
    .spaces-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; flex-wrap: wrap; gap: .6rem; }
    .spaces-header h2 { font-size: 1rem; font-weight: 600; }
    .spaces-notice { font-size: .8rem; color: var(--brown-light); background: var(--sand); border-radius: 8px; padding: .6rem .9rem; }

    .space-edit-card {
      background: #fff; border-radius: 14px; margin-bottom: 1.2rem;
      box-shadow: 0 2px 14px var(--shadow); overflow: hidden;
    }
    .sec-head {
      padding: .85rem 1.2rem; display: flex; align-items: center; gap: .7rem;
      cursor: pointer; user-select: none; border-bottom: 1px solid var(--sand);
    }
    .sec-head:hover { background: var(--cream); }
    .sec-emoji { font-size: 1.3rem; }
    .sec-title { font-weight: 600; font-size: .95rem; flex: 1; }
    .sec-sub { font-size: .75rem; color: var(--brown-light); }
    .sec-body { display: none; padding: 1.2rem; }
    .space-edit-card.open .sec-body { display: block; }
    .space-edit-card.open .chevron { transform: rotate(180deg); }

    /* 사진 갤러리 */
    .img-gallery { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: .8rem; }
    .img-thumb-wrap { position: relative; width: 110px; height: 80px; }
    .img-thumb-wrap img { width: 110px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid var(--gold); }
    .img-thumb-del {
      position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
      background: #DC2626; color: #fff; border: none; border-radius: 50%;
      font-size: .7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .img-thumb-del:hover { background: #b91c1c; }
    .img-add-btn {
      width: 110px; height: 80px; border: 2px dashed var(--gold); border-radius: 8px;
      background: var(--sand); cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .2rem; font-size: .72rem; color: var(--brown-light);
      font-family: inherit; transition: background .15s;
    }
    .img-add-btn:hover { background: var(--gold); }
    .img-upload-input { display: none; }

    .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem 1rem; }
    .field-group label { display: block; font-size: .73rem; font-weight: 600; color: var(--brown-light); margin-bottom: .3rem; }
    .field-group input, .field-group textarea {
      width: 100%; padding: .55rem .75rem; border: 1.5px solid var(--gold); border-radius: 8px;
      font-family: inherit; font-size: .85rem; outline: none; color: var(--brown);
    }
    .field-group input:focus, .field-group textarea:focus { border-color: var(--terra); }
    .field-group textarea { resize: vertical; min-height: 70px; }
    .field-full { grid-column: 1 / -1; }

    .space-save-row { display: flex; align-items: center; gap: .8rem; margin-top: 1rem; padding-top: .9rem; border-top: 1px dashed var(--gold); }
    .space-save-msg { font-size: .75rem; color: #16A34A; display: none; }
    .space-save-err { font-size: .75rem; color: #DC2626; display: none; }

    .empty { text-align: center; padding: 3rem; color: var(--brown-light); }
    .hidden { display: none !important; }

    /* RESERVATION TAB */
    .res-admin-card {
      background: #fff; border-radius: 14px; margin-bottom: .9rem;
      box-shadow: 0 2px 12px var(--shadow); overflow: hidden;
    }
    .res-admin-head {
      padding: .9rem 1.2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: .8rem;
      cursor: pointer; user-select: none;
    }
    .res-admin-head:hover { background: var(--cream); }
    .res-dates {
      display: inline-flex; align-items: center; gap: .4rem;
      background: var(--sand); border-radius: 8px; padding: .28rem .8rem;
      font-size: .8rem; font-weight: 700; color: var(--brown); margin-bottom: .3rem;
    }
    .res-dates-arrow { color: var(--terra); }
    .res-admin-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--sand); }
    .res-admin-card.open .res-admin-body { display: block; }
    .res-admin-card.open .chevron { transform: rotate(180deg); }
    .res-contact-row { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .8rem; }
    .res-contact-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .35rem .85rem; border-radius: 8px; font-size: .78rem; font-weight: 600;
      text-decoration: none; transition: opacity .15s;
    }
    .res-contact-btn:hover { opacity: .8; }
    .res-wa  { background: #25D366; color: #fff; }
    .res-ka  { background: #FEE500; color: #3A1D1D; }
    .res-tel { background: var(--sand); color: var(--brown); border: 1.5px solid var(--gold); }
    .badge-today { background: #FEF3C7; color: #92400E; font-size: .68rem; padding: .15rem .5rem; border-radius: 5px; }
    .badge-upcoming { background: #D1FAE5; color: #065F46; font-size: .68rem; padding: .15rem .5rem; border-radius: 5px; }
    .badge-past { background: #F3F4F6; color: #6B7280; font-size: .68rem; padding: .15rem .5rem; border-radius: 5px; }

    /* SETTINGS TAB */
    .settings-section { background: #fff; border-radius: 14px; padding: 1.4rem; box-shadow: 0 2px 14px var(--shadow); margin-bottom: 1.4rem; }
    .settings-section h3 { font-size: .95rem; font-weight: 600; margin-bottom: 1rem; }
    .set-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem 1rem; }
    .set-field-full { grid-column: 1 / -1; }
    .set-label { display: block; font-size: .73rem; font-weight: 600; color: var(--brown-light); margin-bottom: .3rem; }
    .set-input, .set-textarea {
      width: 100%; padding: .55rem .75rem; border: 1.5px solid var(--gold);
      border-radius: 8px; font-family: inherit; font-size: .85rem; outline: none; color: var(--brown);
    }
    .set-input:focus, .set-textarea:focus { border-color: var(--terra); }
    .set-textarea { resize: vertical; min-height: 60px; }
    .set-save-row { display: flex; align-items: center; gap: .8rem; margin-top: 1rem; padding-top: .9rem; border-top: 1px dashed var(--gold); }

    /* GALLERY ADMIN */
    .gallery-admin-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .8rem; }
    .gallery-slot {
      border-radius: 12px; overflow: hidden; aspect-ratio: 1;
      position: relative; background: var(--sand); border: 2px solid var(--gold);
    }
    .gallery-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-slot-empty {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .3rem;
      font-size: .7rem; color: var(--brown-light);
    }
    .gallery-slot-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.45);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: .4rem; opacity: 0; transition: opacity .2s;
    }
    .gallery-slot:hover .gallery-slot-overlay { opacity: 1; }
    .gal-btn {
      padding: .3rem .7rem; border-radius: 7px; font-size: .72rem; font-weight: 600;
      cursor: pointer; border: none; font-family: inherit;
    }
    .gal-btn-upload { background: #fff; color: var(--brown); }
    .gal-btn-remove { background: #DC2626; color: #fff; }

    /* REVIEW ORDER BUTTONS */
    .rev-order-btns { display: flex; gap: .3rem; }
    .rev-order-btn {
      width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--gold);
      background: var(--sand); cursor: pointer; font-size: .75rem; display: flex;
      align-items: center; justify-content: center; transition: background .15s;
    }
    .rev-order-btn:hover { background: var(--gold); }
    .rev-order-btn:disabled { opacity: .3; cursor: default; }

    /* PENDING REVIEWS */
    .pending-section { background: #fff; border-radius: 14px; padding: 1.2rem 1.4rem; box-shadow: 0 2px 14px var(--shadow); margin-bottom: 1.6rem; }
    .pending-section h3 { font-size: .95rem; font-weight: 600; margin-bottom: .9rem; }
    .pending-card { border: 1.5px solid var(--gold); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: .8rem; background: var(--cream); }
    .pending-card:last-child { margin-bottom: 0; }
    .pending-meta { font-size: .75rem; color: var(--brown-light); margin-bottom: .4rem; }
    .pending-name { font-weight: 700; font-size: .92rem; }
    .pending-stars { color: #E8A020; font-size: .85rem; margin: .25rem 0; }
    .pending-text { font-size: .85rem; line-height: 1.6; color: var(--brown); margin: .4rem 0 .8rem; white-space: pre-wrap; }
    .pending-actions { display: flex; gap: .5rem; flex-wrap: wrap; }
    .btn-approve { padding: .4rem 1rem; background: #16A34A; color: #fff; border: none; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .btn-approve:hover { opacity: .85; }
    .btn-reject { padding: .4rem 1rem; background: #FEE2E2; color: #DC2626; border: 1.5px solid #FCA5A5; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-reject:hover { background: #FECACA; }
    .pending-badge { display: inline-flex; align-items: center; justify-content: center; background: #DC2626; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: .65rem; font-weight: 700; margin-left: .35rem; vertical-align: middle; }

    /* REVIEWS ADMIN */
    .review-add-box {
      background: #fff; border-radius: 14px; padding: 1.4rem;
      box-shadow: 0 2px 14px var(--shadow); margin-bottom: 1.4rem;
    }
    .review-add-box h3 { font-size: .95rem; font-weight: 600; margin-bottom: 1rem; }
    .rev-fields { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem 1rem; }
    .rev-field-full { grid-column: 1 / -1; }
    .rev-label { display: block; font-size: .73rem; font-weight: 600; color: var(--brown-light); margin-bottom: .3rem; }
    .rev-input, .rev-select, .rev-textarea {
      width: 100%; padding: .55rem .75rem; border: 1.5px solid var(--gold);
      border-radius: 8px; font-family: inherit; font-size: .85rem; outline: none; color: var(--brown);
    }
    .rev-input:focus, .rev-select:focus, .rev-textarea:focus { border-color: var(--terra); }
    .rev-textarea { resize: vertical; min-height: 70px; }
    .star-select { display: flex; gap: .3rem; margin-top: .2rem; }
    .star-btn {
      font-size: 1.3rem; background: none; border: none; cursor: pointer;
      color: #D1D5DB; transition: color .1s; padding: 0;
    }
    .star-btn.on { color: #E8A020; }

    .rev-photo-row { display: flex; align-items: center; gap: .8rem; margin-top: .3rem; }
    .rev-avatar-preview {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      background: var(--terra); display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 1.1rem; overflow: hidden; flex-shrink: 0;
      border: 2px solid var(--gold);
    }
    .rev-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .rev-photo-btns { display: flex; flex-direction: column; gap: .3rem; }
    .btn-photo-upload {
      padding: .35rem .8rem; background: var(--sand); border: 1.5px solid var(--gold);
      border-radius: 7px; font-size: .75rem; font-weight: 600; cursor: pointer;
      font-family: inherit; color: var(--brown); transition: background .15s;
    }
    .btn-photo-upload:hover { background: var(--gold); }
    .btn-photo-remove {
      padding: .3rem .7rem; background: #FEE2E2; border: 1.5px solid #FCA5A5;
      border-radius: 7px; font-size: .72rem; cursor: pointer; font-family: inherit;
      color: #DC2626; display: none;
    }

    .review-card-admin {
      background: #fff; border-radius: 14px; margin-bottom: .9rem;
      box-shadow: 0 2px 12px var(--shadow); overflow: hidden;
    }
    .rev-card-head {
      padding: .85rem 1.2rem; display: flex; align-items: center; gap: .8rem;
      cursor: pointer; user-select: none;
    }
    .rev-card-head:hover { background: var(--cream); }
    .rev-card-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; background: var(--terra); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .9rem; overflow: hidden;
    }
    .rev-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .rev-card-info { flex: 1; }
    .rev-card-name { font-weight: 600; font-size: .9rem; }
    .rev-card-meta { font-size: .72rem; color: var(--brown-light); margin-top: .1rem; }
    .rev-card-stars { color: #E8A020; font-size: .85rem; }
    .rev-card-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--sand); }
    .review-card-admin.open .rev-card-body { display: block; }
    .review-card-admin.open .chevron { transform: rotate(180deg); }
    .rev-body-text { background: var(--cream); border-radius: 8px; padding: .75rem 1rem; font-size: .85rem; line-height: 1.65; font-style: italic; margin: .8rem 0; }
    .rev-del-btn {
      padding: .4rem .9rem; background: #FEE2E2; border: 1.5px solid #FCA5A5;
      border-radius: 8px; font-size: .78rem; cursor: pointer; font-family: inherit; color: #DC2626;
      transition: background .15s;
    }
    .rev-del-btn:hover { background: #FECACA; }

    @media (max-width: 520px) {
      .info-grid { grid-template-columns: 1fr; }
      .reply-opt-label { display: none; }
      .fields-grid { grid-template-columns: 1fr; }
      .img-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<header>
  <h1>🏡 Hue Stay · 관리자</h1>
  <a href="/">← 홈으로</a>
</header>

<!-- LOGIN -->
<div id="loginSection">
  <div class="login-wrap">
    <h2>관리자 로그인</h2>
    <input type="password" id="secretInput" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="err hidden" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminSection" class="hidden">
  <!-- TAB NAV -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="inquiries"    onclick="switchTab('inquiries')">📋 문의</button>
    <button class="tab-btn"        data-tab="reservations" onclick="switchTab('reservations')">📅 예약 현황</button>
    <button class="tab-btn"        data-tab="reviews"      onclick="switchTab('reviews')">⭐ 후기<span id="pendingBadge" class="pending-badge hidden">0</span></button>
    <button class="tab-btn"        data-tab="spaces"       onclick="switchTab('spaces')">🏠 공간</button>
    <button class="tab-btn"        data-tab="settings"     onclick="switchTab('settings')">⚙️ 사이트 설정</button>
  </div>

  <!-- 문의 관리 탭 -->
  <div id="tabInquiries" class="container">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="statTotal">-</div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-num" id="statPub">-</div><div class="stat-label">공개</div></div>
      <div class="stat"><div class="stat-num" id="statPriv">-</div><div class="stat-label">비공개</div></div>
      <div class="stat"><div class="stat-num" id="statReplied">-</div><div class="stat-label">답변완료</div></div>
      <button class="refresh-btn" onclick="fetchInquiries()">새로고침</button>
    </div>

<script>
const API_BASE = 'https://huestay-api.perfectjjong.workers.dev';
let adminSecret = '';
let posts = [];
let spacesData = [];
let pendingImages = {}; // { spaceId: File }

/* ── 로그인 ── */
function doLogin() {
  const v = document.getElementById('secretInput').value.trim();
  if (!v) return;
  adminSecret = v;
  fetchInquiries();
}

/* ── 탭 전환 ── */
const TAB_IDS = { inquiries:'tabInquiries', reservations:'tabReservations', reviews:'tabReviews', spaces:'tabSpaces', settings:'tabSettings' };
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  Object.entries(TAB_IDS).forEach(([k,id]) => document.getElementById(id).classList.toggle('hidden', k !== tab));
  if (tab === 'reservations') fetchReservations();
  if (tab === 'spaces' && spacesData.length === 0) fetchSpaces();
  if (tab === 'reviews') { fetchReviews(); fetchPendingReviews(); renderAddReviewPhotos(); }
  if (tab === 'settings') fetchSettings();
}

/* ════════════════════════════
   문의 관리
════════════════════════════ */
async function fetchInquiries() {
  const errEl = document.getElementById('loginErr');
  errEl.classList.add('hidden');
  try {
    const r = await fetch(`${API_BASE}/admin/inquiries?secret=${encodeURIComponent(adminSecret)}`);
    const d = await r.json();
    if (!d.ok) {
      errEl.textContent = '비밀번호가 올바르지 않습니다.';
      errEl.classList.remove('hidden');
      return;
    }
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('adminSection').classList.remove('hidden');
    posts = d.posts || [];
    renderCards();
  } catch {
    errEl.textContent = '서버 오류. 잠시 후 다시 시도해주세요.';
    errEl.classList.remove('hidden');
  }
}

function renderCards() {
  const total   = posts.length;
  const pub     = posts.filter(p => !p.isPrivate).length;
  const priv    = posts.filter(p =>  p.isPrivate).length;
  const replied = posts.filter(p =>  p.reply).length;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statPub').textContent     = pub;
  document.getElementById('statPriv').textContent    = priv;
  document.getElementById('statReplied').textContent = replied;

  const el = document.getElementById('cardList');
  if (!posts.length) {
    el.innerHTML = '<div class="empty">📋 아직 접수된 문의가 없습니다.</div>';
    return;
  }

  el.innerHTML = [...posts].reverse().map(p => {
    const badge = p.isPrivate
      ? `<span class="badge-priv">🔒 비공개</span>`
      : `<span class="badge-pub">🌐 공개</span>`;
    const repliedBadge = p.reply ? `<span class="badge-replied">✅ 답변완료</span>` : '';
    const waHref = p.contact ? `https://wa.me/${p.contact.replace(/[^0-9]/g,'')}` : 'https://wa.me/';
    const infoRows = [
      ['이름', p.name], ['연락처', p.contact||'-'],
      ['이메일', p.email||'-'], ['회사명', p.company||'-'],
    ].map(([l,v]) => `<div class="info-row"><div class="info-label">${l}</div>${esc(v)}</div>`).join('');

    return `<div class="card" id="card-${p.id}">
      <div class="card-head" onclick="toggleCard(${p.id})">
        <div>
          <div class="card-subject">${esc(p.subject)}</div>
          <div class="card-meta">${esc(p.name)} · ${p.date}</div>
        </div>
        <div class="card-right">
          ${badge}${repliedBadge}
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="card-body">
        <div class="info-grid">${infoRows}</div>
        <div class="msg-box">${esc(p.message)}</div>
        <div class="reply-section">
          <label>💬 게시판 답변</label>
          <textarea id="reply-${p.id}" placeholder="답변을 입력하세요...">${esc(p.reply||'')}</textarea>
          <div class="reply-actions">
            <button class="btn-save" onclick="saveReply(${p.id})" id="btn-${p.id}">답변 저장</button>
            <span class="save-msg hidden" id="msg-${p.id}">저장되었습니다 ✓</span>
            <span class="reply-opt-label">선택 — 앱으로 직접 보내기:</span>
            <div class="reply-btns">
              <a class="reply-btn reply-wa" href="${waHref}" target="_blank">📱 왓츠앱</a>
              <a class="reply-btn reply-ka" href="https://open.kakao.com/o/search#perfectjjong" target="_blank">💬 카카오</a>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('open');
}

async function saveReply(id) {
  const textarea = document.getElementById(`reply-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  const msg = document.getElementById(`msg-${id}`);
  const reply = textarea.value.trim();
  btn.disabled = true;
  try {
    const r = await fetch(`${API_BASE}/admin/reply?secret=${encodeURIComponent(adminSecret)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, reply }),
    });
    const d = await r.json();
    if (d.ok) {
      const post = posts.find(p => p.id === id);
      if (post) post.reply = reply;
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
      const card = document.getElementById(`card-${id}`);
      const repliedBadge = card.querySelector('.badge-replied');
      if (reply && !repliedBadge) {
        card.querySelector('.card-right').insertAdjacentHTML('afterbegin', `<span class="badge-replied">✅ 답변완료</span>`);
      }
      document.getElementById('statReplied').textContent = posts.filter(p => p.reply).length;
    }
  } catch {
    alert('저장 실패. 다시 시도해주세요.');
  } finally {
    btn.disabled = false;
  }
}

/* ════════════════════════════
   공간 관리
════════════════════════════ */
async function fetchSpaces() {
  try {
    const r = await fetch(`${API_BASE}/spaces`);
    const d = await r.json();
    if (d.ok && Array.isArray(d.spaces)) {
      spacesData = d.spaces;
      renderSpaces();
    }
  } catch {
    document.getElementById('spacesList').innerHTML = '<div class="empty">공간 데이터를 불러올 수 없습니다.</div>';
  }
}

function getImgs(s) { return Array.isArray(s.imgs) ? s.imgs : (s.img ? [s.img] : []); }

function renderSpaces() {
  const el = document.getElementById('spacesList');
  el.innerHTML = spacesData.map(s => {
    const imgs = getImgs(s);
    return `
    <div class="space-edit-card" id="sec-${s.id}">
      <div class="sec-head" onclick="toggleSec('${s.id}')">
        <span class="sec-emoji">${s.emoji}</span>
        <div style="flex:1">
          <div class="sec-title">${esc(s.nKo)} <span style="font-weight:400;color:var(--brown-light)">/ ${esc(s.nEn)}</span></div>
          <div class="sec-sub">${esc(s.bKo)} · ${s.id} · 사진 ${imgs.length}장</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="sec-body">
        <!-- 사진 갤러리 -->
        <div style="margin-bottom:.5rem;font-size:.78rem;font-weight:600;color:var(--brown-light)">사진 (수량 제한 없음 · JPG/PNG/WebP)</div>
        <div class="img-gallery" id="gallery-${s.id}">
          ${imgs.map((url, i) => imgThumbHtml(s.id, url, i)).join('')}
          <label class="img-add-btn" for="file-${s.id}">
            <span style="font-size:1.4rem">+</span>
            <span>사진 추가</span>
          </label>
        </div>
        <input type="file" class="img-upload-input" id="file-${s.id}" accept="image/*" multiple onchange="onFilesChange('${s.id}', this)">

        <!-- 텍스트 필드 -->
        <div class="fields-grid">
          <div class="field-group">
            <label>이름 (한국어)</label>
            <input type="text" id="nKo-${s.id}" value="${esc(s.nKo)}">
          </div>
          <div class="field-group">
            <label>이름 (영어)</label>
            <input type="text" id="nEn-${s.id}" value="${esc(s.nEn)}">
          </div>
          <div class="field-group">
            <label>카테고리 레이블 (한국어)</label>
            <input type="text" id="bKo-${s.id}" value="${esc(s.bKo)}">
          </div>
          <div class="field-group">
            <label>카테고리 레이블 (영어)</label>
            <input type="text" id="bEn-${s.id}" value="${esc(s.bEn)}">
          </div>
          <div class="field-group field-full">
            <label>설명 (한국어)</label>
            <textarea id="dKo-${s.id}">${esc(s.dKo)}</textarea>
          </div>
          <div class="field-group field-full">
            <label>설명 (영어)</label>
            <textarea id="dEn-${s.id}">${esc(s.dEn)}</textarea>
          </div>
        </div>

        <div class="space-save-row">
          <button class="btn-save" onclick="saveSpace('${s.id}')" id="sbtn-${s.id}">저장</button>
          <span class="space-save-msg" id="smsg-${s.id}">저장되었습니다 ✓</span>
          <span class="space-save-err" id="serr-${s.id}"></span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function imgThumbHtml(spaceId, url, idx) {
  return `<div class="img-thumb-wrap" id="thumb-${spaceId}-${idx}">
    <img src="${esc(url)}" onerror="this.src=''">
    <button class="img-thumb-del" onclick="removeImg('${spaceId}',${idx})" title="삭제">✕</button>
  </div>`;
}

function refreshGallery(spaceId) {
  const s = spacesData.find(x => x.id === spaceId);
  if (!s) return;
  const imgs = getImgs(s);
  const gallery = document.getElementById(`gallery-${spaceId}`);
  const addBtn = gallery.querySelector('.img-add-btn').outerHTML;
  gallery.innerHTML = imgs.map((url, i) => imgThumbHtml(spaceId, url, i)).join('') + addBtn;
  // sec-sub 업데이트
  document.querySelector(`#sec-${spaceId} .sec-sub`).textContent = `${esc(s.bKo)} · ${s.id} · 사진 ${imgs.length}장`;
}

function toggleSec(id) {
  document.getElementById(`sec-${id}`).classList.toggle('open');
}

function onFilesChange(id, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  if (!pendingImages[id]) pendingImages[id] = [];
  files.forEach(f => pendingImages[id].push(f));
  // 미리보기를 로컬 ObjectURL로 갤러리에 추가
  const s = spacesData.find(x => x.id === id);
  if (!s.imgs) s.imgs = s.img ? [s.img] : [];
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    s.imgs.push('__pending__' + url); // 저장 전 임시 표시
  });
  refreshGallery(id);
  input.value = '';
}

async function removeImg(spaceId, idx) {
  const s = spacesData.find(x => x.id === spaceId);
  if (!s) return;
  const imgs = getImgs(s);
  const url = imgs[idx];

  if (url && !url.startsWith('__pending__') && url.startsWith('/images/spaces/')) {
    const key = url.split('/').pop();
    await fetch(`${API_BASE}/admin/spaces/${spaceId}/image/remove?secret=${encodeURIComponent(adminSecret)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }),
    }).catch(() => {});
  }

  s.imgs = imgs.filter((_, i) => i !== idx);
  // pendingImages에서도 제거 (임시 URL 기준)
  if (pendingImages[spaceId] && url && url.startsWith('__pending__')) {
    const blobUrl = url.replace('__pending__', '');
    pendingImages[spaceId] = pendingImages[spaceId].filter(f => URL.createObjectURL(f) !== blobUrl);
  }
  refreshGallery(spaceId);
  await saveSpaceMeta(spaceId);
}

async function saveSpace(id) {
  const btn = document.getElementById(`sbtn-${id}`);
  const msg = document.getElementById(`smsg-${id}`);
  const err = document.getElementById(`serr-${id}`);
  btn.disabled = true;
  msg.style.display = 'none';
  err.style.display = 'none';

  try {
    // 대기 중인 이미지 업로드
    if (pendingImages[id] && pendingImages[id].length) {
      const fd = new FormData();
      pendingImages[id].forEach(f => fd.append('file', f));
      const r = await fetch(`${API_BASE}/admin/spaces/${id}/image?secret=${encodeURIComponent(adminSecret)}`, {
        method: 'POST', body: fd,
      });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || '이미지 업로드 실패');
      const s = spacesData.find(x => x.id === id);
      // 임시 URL 제거 후 실제 URL로 교체
      s.imgs = (s.imgs || []).filter(u => !u.startsWith('__pending__'));
      d.urls.forEach(({ url }) => s.imgs.push(url));
      delete pendingImages[id];
      refreshGallery(id);
    }

    // 텍스트 메타 반영 후 저장
    const s = spacesData.find(x => x.id === id);
    if (s) {
      s.nKo = document.getElementById(`nKo-${id}`).value.trim();
      s.nEn = document.getElementById(`nEn-${id}`).value.trim();
      s.bKo = document.getElementById(`bKo-${id}`).value.trim();
      s.bEn = document.getElementById(`bEn-${id}`).value.trim();
      s.dKo = document.getElementById(`dKo-${id}`).value.trim();
      s.dEn = document.getElementById(`dEn-${id}`).value.trim();
    }
    await saveSpaceMeta(id);

    msg.style.display = 'inline';
    setTimeout(() => { msg.style.display = 'none'; }, 3000);
  } catch (e) {
    err.textContent = e.message || '오류가 발생했습니다.';
    err.style.display = 'inline';
  } finally {
    btn.disabled = false;
  }
}

async function saveSpaceMeta(id) {
  const cleanSpaces = spacesData.map(s => ({
    ...s,
    imgs: (s.imgs || []).filter(u => !u.startsWith('__pending__')),
    img: undefined,
  }));
  const r = await fetch(`${API_BASE}/admin/spaces?secret=${encodeURIComponent(adminSecret)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ spaces: cleanSpaces }),
  });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || '저장 실패');
}

/* ════════════════════════════
   예약 현황
════════════════════════════ */
let reservations = [];

async function fetchReservations() {
  try {
    const r = await fetch(`${API_BASE}/admin/reservations?secret=${encodeURIComponent(adminSecret)}`);
    const d = await r.json();
    if (d.ok) { reservations = d.reservations || []; renderReservations(); }
    else document.getElementById('resList').innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.</div>';
  } catch {
    document.getElementById('resList').innerHTML = '<div class="empty">서버 오류.</div>';
  }
}

function renderReservations() {
  const today = new Date().toISOString().slice(0,10);
  const sorted = [...reservations].sort((a,b) => (b.checkin||'').localeCompare(a.checkin||''));
  const upcoming = sorted.filter(r => r.checkin >= today);
  const todayIn  = sorted.filter(r => r.checkin === today);
  document.getElementById('resStatTotal').textContent    = sorted.length;
  document.getElementById('resStatUpcoming').textContent = upcoming.length;
  document.getElementById('resStatToday').textContent    = todayIn.length;

  if (!sorted.length) {
    document.getElementById('resList').innerHTML = '<div class="empty">📅 예약 내역이 없습니다.</div>';
    return;
  }

  document.getElementById('resList').innerHTML = sorted.map((res, i) => {
    let badge = '';
    if (res.checkin === today)    badge = `<span class="badge-today">오늘 체크인</span>`;
    else if (res.checkin > today) badge = `<span class="badge-upcoming">예정</span>`;
    else                          badge = `<span class="badge-past">완료</span>`;

    const nights = res.checkin && res.checkout
      ? Math.round((new Date(res.checkout)-new Date(res.checkin))/(86400000))
      : '-';
    const wa = res.contact ? `https://wa.me/${res.contact.replace(/[^0-9]/g,'')}` : '#';
    const tel = res.contact ? `tel:${res.contact.replace(/\s/g,'')}` : '#';

    return `<div class="res-admin-card" id="resc-${i}">
      <div class="res-admin-head" onclick="this.parentElement.classList.toggle('open')">
        <div>
          <div class="res-dates">
            ${esc(res.checkin||'-')} <span class="res-dates-arrow">→</span> ${esc(res.checkout||'-')}
            ${nights!=='-'?`<span style="color:var(--brown-light);font-weight:400">(${nights}박)</span>`:''}
          </div>
          <div style="font-weight:600;font-size:.88rem">${esc(res.name)} <span style="font-weight:400;font-size:.8rem;color:var(--brown-light)">· ${esc(res.guests||'-')}명</span></div>
          ${res.company?`<div style="font-size:.75rem;color:var(--brown-light)">${esc(res.company)}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">${badge}<span class="chevron">▼</span></div>
      </div>
      <div class="res-admin-body">
        <div class="info-grid">
          <div class="info-row"><div class="info-label">연락처</div>${esc(res.contact||'-')}</div>
          <div class="info-row"><div class="info-label">이메일</div>${esc(res.email||'-')}</div>
          <div class="info-row"><div class="info-label">회사명</div>${esc(res.company||'-')}</div>
          <div class="info-row"><div class="info-label">접수일시</div>${esc(res.date||'-')}</div>
        </div>
        ${res.message?`<div class="msg-box">${esc(res.message)}</div>`:''}
        <div class="res-contact-row">
          <a class="res-contact-btn res-wa" href="${wa}" target="_blank">📱 WhatsApp</a>
          <a class="res-contact-btn res-ka" href="https://open.kakao.com/o/search#perfectjjong" target="_blank">💬 KakaoTalk</a>
          ${res.contact?`<a class="res-contact-btn res-tel" href="${tel}">📞 전화</a>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════
   사이트 설정 (가격 · 히어로 · 갤러리)
════════════════════════════ */
let siteConfig = {};
let galleryData = [
  {slot:'g1',url:'',key:''},{slot:'g2',url:'',key:''},
  {slot:'g3',url:'',key:''},{slot:'g4',url:'',key:''},
  {slot:'g5',url:'',key:''},
];
let pendingGallery = {}; // { slot: File }

async function fetchSettings() {
  try {
    const [cfgRes, galRes] = await Promise.all([
      fetch(`${API_BASE}/site-config`),
      fetch(`${API_BASE}/gallery`),
    ]);
    const cfgData = await cfgRes.json();
    const galData = await galRes.json();
    if (cfgData.ok) {
      siteConfig = cfgData.config || {};
      document.getElementById('setPriceSar').value  = siteConfig.priceSar  || 575;
      document.getElementById('setPriceKrw').value  = siteConfig.priceKrw  || 209000;
      document.getElementById('setSubKo').value      = siteConfig.heroSubKo || '';
      document.getElementById('setSubEn').value      = siteConfig.heroSubEn || '';
    }
    if (galData.ok && galData.gallery.length) {
      galleryData = galData.gallery;
    }
    renderGalleryAdmin();
  } catch {}
}

async function saveSettings(section) {
  const msgId = section === 'price' ? 'setPriceMsg' : 'setHeroMsg';
  const msg = document.getElementById(msgId);
  try {
    if (section === 'price') {
      siteConfig.priceSar = parseInt(document.getElementById('setPriceSar').value) || 575;
      siteConfig.priceKrw = parseInt(document.getElementById('setPriceKrw').value) || 209000;
    } else {
      siteConfig.heroSubKo = document.getElementById('setSubKo').value.trim();
      siteConfig.heroSubEn = document.getElementById('setSubEn').value.trim();
    }
    const r = await fetch(`${API_BASE}/admin/site-config?secret=${encodeURIComponent(adminSecret)}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(siteConfig),
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 3000);
  } catch(e) { alert('저장 실패: ' + e.message); }
}

/* ── 갤러리 어드민 ── */
function renderGalleryAdmin() {
  const el = document.getElementById('galleryAdminGrid');
  el.innerHTML = galleryData.map((g, i) => {
    const hasImg = g.url && !g.url.startsWith('__pending__');
    const pendingUrl = g.url && g.url.startsWith('__pending__') ? g.url.replace('__pending__','') : '';
    const showUrl = pendingUrl || (hasImg ? g.url : '');
    return `<div class="gallery-slot" id="gslot-${g.slot}">
      ${showUrl
        ? `<img src="${esc(showUrl)}" onerror="this.style.display='none'">`
        : `<div class="gallery-slot-empty"><span style="font-size:1.4rem">+</span><span>슬롯 ${i+1}</span></div>`}
      <div class="gallery-slot-overlay">
        <label class="gal-btn gal-btn-upload" for="galfile-${g.slot}">📷 변경</label>
        ${showUrl ? `<button class="gal-btn gal-btn-remove" onclick="removeGallerySlot('${g.slot}')">삭제</button>` : ''}
      </div>
      <input type="file" id="galfile-${g.slot}" accept="image/*" style="display:none" onchange="onGalFileChange('${g.slot}',this)">
    </div>`;
  }).join('');
}

function onGalFileChange(slot, input) {
  if (!input.files[0]) return;
  pendingGallery[slot] = input.files[0];
  const g = galleryData.find(x => x.slot === slot);
  if (g) g.url = '__pending__' + URL.createObjectURL(input.files[0]);
  renderGalleryAdmin();
  uploadGallerySlot(slot);
}

async function uploadGallerySlot(slot) {
  const file = pendingGallery[slot];
  if (!file) return;
  const msg = document.getElementById('galSaveMsg');
  const err = document.getElementById('galSaveErr');
  msg.classList.add('hidden'); err.classList.add('hidden');
  try {
    const fd = new FormData(); fd.append('file', file);
    const r = await fetch(`${API_BASE}/admin/gallery/${slot}/image?secret=${encodeURIComponent(adminSecret)}`, {
      method: 'POST', body: fd,
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    const g = galleryData.find(x => x.slot === slot);
    // remove old image if any
    if (g && g.key) {
      await fetch(`${API_BASE}/admin/gallery/${slot}/image/remove?secret=${encodeURIComponent(adminSecret)}`, {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ key: g.key }),
      }).catch(()=>{});
    }
    if (g) { g.url = d.url; g.key = d.key; }
    delete pendingGallery[slot];
    await saveGalleryMeta();
    renderGalleryAdmin();
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 3000);
  } catch(e) {
    err.textContent = '업로드 실패: ' + e.message;
    err.classList.remove('hidden');
    const g = galleryData.find(x => x.slot === slot);
    if (g && g.url.startsWith('__pending__')) g.url = '';
    renderGalleryAdmin();
  }
}

async function removeGallerySlot(slot) {
  if (!confirm('이 사진을 삭제하시겠습니까?')) return;
  const g = galleryData.find(x => x.slot === slot);
  if (!g) return;
  if (g.key) {
    await fetch(`${API_BASE}/admin/gallery/${slot}/image/remove?secret=${encodeURIComponent(adminSecret)}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ key: g.key }),
    }).catch(()=>{});
  }
  g.url = ''; g.key = '';
  await saveGalleryMeta();
  renderGalleryAdmin();
}

async function saveGalleryMeta() {
  const r = await fetch(`${API_BASE}/admin/gallery?secret=${encodeURIComponent(adminSecret)}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ gallery: galleryData.map(g => ({ slot: g.slot, url: g.url.startsWith('__pending__') ? '' : g.url, key: g.key||'' })) }),
  });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ════════════════════════════
   후기 관리
════════════════════════════ */
let reviewsData = [];
let addStarVal = 5;
let addPhotoFile = null;
let addReviewPhotoFiles = [];

/* ════════════════════════════
   대기 중 후기 관리
════════════════════════════ */
let pendingReviews = [];

async function fetchPendingReviews() {
  try {
    const r = await fetch(`${API_BASE}/admin/reviews/pending?secret=${encodeURIComponent(adminSecret)}`);
    const d = await r.json();
    if (d.ok) { pendingReviews = d.pending || []; renderPendingReviews(); }
  } catch {}
}

function renderPendingReviews() {
  const el = document.getElementById('pendingList');
  const badge = document.getElementById('pendingBadge');
  const count = document.getElementById('pendingCount');
  count.textContent = `(${pendingReviews.length}건)`;
  if (pendingReviews.length > 0) {
    badge.textContent = pendingReviews.length;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
  if (!pendingReviews.length) {
    el.innerHTML = '<div class="empty" style="padding:1rem">대기 중인 후기가 없습니다.</div>';
    return;
  }
  el.innerHTML = pendingReviews.map(rv => {
    const stars = '★'.repeat(rv.rating||5) + '☆'.repeat(5-(rv.rating||5));
    const photoHtml = rv.photoUrl
      ? `<div style="margin:.4rem 0"><img src="${API_BASE}${esc(rv.photoUrl)}" style="height:70px;border-radius:8px;object-fit:cover" onerror="this.style.display='none'"></div>`
      : '';
    const submitted = rv.submittedAt ? new Date(rv.submittedAt).toLocaleString('ko-KR') : '';
    return `<div class="pending-card">
      <div class="pending-meta">제출: ${submitted}</div>
      <div class="pending-name">${esc(rv.name)}</div>
      <div class="pending-stars">${stars}</div>
      <div class="pending-text">${esc(rv.textKo||'')}</div>
      ${photoHtml}
      <div class="pending-actions">
        <button class="btn-approve" onclick="approveReview('${esc(rv.id)}')">✅ 승인 (메인 게시)</button>
        <button class="btn-reject"  onclick="rejectReview('${esc(rv.id)}')">🗑️ 거절</button>
      </div>
    </div>`;
  }).join('');
}

async function approveReview(id) {
  if (!confirm('이 후기를 메인 페이지에 게시하겠습니까?')) return;
  try {
    const r = await fetch(`${API_BASE}/admin/reviews/approve/${id}?secret=${encodeURIComponent(adminSecret)}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) { await fetchPendingReviews(); await fetchReviews(); }
    else alert('승인 실패: ' + d.error);
  } catch { alert('오류가 발생했습니다.'); }
}

async function rejectReview(id) {
  if (!confirm('이 후기를 삭제하겠습니까?')) return;
  try {
    const r = await fetch(`${API_BASE}/admin/reviews/reject/${id}?secret=${encodeURIComponent(adminSecret)}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) await fetchPendingReviews();
    else alert('거절 실패: ' + d.error);
  } catch { alert('오류가 발생했습니다.'); }
}

/* ── 후기 사진 (추가 폼) ── */
function renderAddReviewPhotos() {
  const wrap = document.getElementById('addReviewPhotosWrap');
  if (!wrap) return;
  const thumbs = addReviewPhotoFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="img-thumb-wrap"><img src="${url}"><button class="img-thumb-del" onclick="removeAddReviewPhoto(${i})" title="삭제">✕</button></div>`;
  }).join('');
  const addBtn = addReviewPhotoFiles.length < 10
    ? `<label class="img-add-btn" for="addReviewPhotosInput"><span style="font-size:1.4rem">+</span><span>사진 추가</span></label>`
    : '';
  wrap.innerHTML = thumbs + addBtn;
}

function onAddReviewPhotosChange(input) {
  const files = Array.from(input.files);
  const remaining = 10 - addReviewPhotoFiles.length;
  files.slice(0, remaining).forEach(f => addReviewPhotoFiles.push(f));
  renderAddReviewPhotos();
  input.value = '';
}

function removeAddReviewPhoto(idx) {
  addReviewPhotoFiles.splice(idx, 1);
  renderAddReviewPhotos();
}

/* ── 후기 사진 (기존 후기 카드) ── */
async function addReviewPhoto(reviewIdx, input) {
  const file = input.files[0]; if (!file) return;
  input.value = '';
  const rv = reviewsData[reviewIdx]; if (!rv) return;
  if ((rv.photos||[]).length >= 10) { alert('사진은 최대 10장까지 추가할 수 있습니다.'); return; }
  try {
    const fd = new FormData(); fd.append('file', file);
    const r = await fetch(`${API_BASE}/admin/reviews/${rv.id}/image?secret=${encodeURIComponent(adminSecret)}`, {
      method: 'POST', body: fd,
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    if (!rv.photos) rv.photos = [];
    rv.photos.push({ key: d.key, url: d.url });
    await saveReviewsMeta();
    renderReviews();
    setTimeout(() => { const c = document.getElementById(`rcard-${reviewIdx}`); if (c) c.classList.add('open'); }, 50);
  } catch(e) { alert('사진 업로드 실패: ' + e.message); }
}

async function removeReviewPhoto(reviewIdx, key) {
  if (!confirm('이 사진을 삭제하시겠습니까?')) return;
  const rv = reviewsData[reviewIdx]; if (!rv) return;
  await fetch(`${API_BASE}/admin/reviews/${rv.id}/image/remove?secret=${encodeURIComponent(adminSecret)}`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ key }),
  }).catch(()=>{});
  rv.photos = (rv.photos||[]).filter(p => p.key !== key);
  await saveReviewsMeta();
  renderReviews();
  setTimeout(() => { const c = document.getElementById(`rcard-${reviewIdx}`); if (c) c.classList.add('open'); }, 50);
}

async function fetchReviews() {
  try {
    const r = await fetch(`${API_BASE}/reviews`);
    const d = await r.json();
    if (d.ok) { reviewsData = d.reviews || []; renderReviews(); }
  } catch {
    document.getElementById('reviewsList').innerHTML = '<div class="empty">후기 데이터를 불러올 수 없습니다.</div>';
  }
}

function renderReviews() {
  const el = document.getElementById('reviewsList');
  if (!reviewsData.length) {
    el.innerHTML = '<div class="empty">⭐ 등록된 후기가 없습니다. 위에서 추가하세요.</div>';
    return;
  }
  const total = reviewsData.length;
  el.innerHTML = reviewsData.map((rv, idx) => {
    const stars = '★'.repeat(rv.rating||5) + '☆'.repeat(5-(rv.rating||5));
    const initial = (rv.name||'?')[0].toUpperCase();
    const avatarHtml = rv.photoUrl
      ? `<div class="rev-card-avatar"><img src="${esc(rv.photoUrl)}" onerror="this.style.display='none'"></div>`
      : `<div class="rev-card-avatar">${initial}</div>`;
    return `
    <div class="review-card-admin" id="rcard-${idx}">
      <div class="rev-card-head" onclick="toggleRevCard(${idx})">
        ${avatarHtml}
        <div class="rev-card-info">
          <div class="rev-card-name">${esc(rv.name)}</div>
          <div class="rev-card-meta"><span class="rev-card-stars">${stars}</span> · ${esc(rv.via||'Google Maps')} · ${esc(rv.date||'')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.4rem" onclick="event.stopPropagation()">
          <div class="rev-order-btns">
            <button class="rev-order-btn" onclick="moveReview(${idx},-1)" ${idx===0?'disabled':''} title="위로">▲</button>
            <button class="rev-order-btn" onclick="moveReview(${idx},1)" ${idx===total-1?'disabled':''} title="아래로">▼</button>
          </div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="rev-card-body">
        <div class="rev-body-text">${esc(rv.textKo||'')}</div>
        ${rv.textEn?`<div class="rev-body-text" style="font-size:.82rem;color:var(--brown-light)">${esc(rv.textEn)}</div>`:''}
        <div style="margin:.8rem 0 .3rem;font-size:.73rem;font-weight:600;color:var(--brown-light)">후기 사진 (${(rv.photos||[]).length}/10)</div>
        <div class="img-gallery">
          ${(rv.photos||[]).map(p => `<div class="img-thumb-wrap">
            <img src="${esc(API_BASE + p.url)}" onerror="this.style.display='none'">
            <button class="img-thumb-del" onclick="removeReviewPhoto(${idx},'${esc(p.key)}')" title="삭제">✕</button>
          </div>`).join('')}
          ${(rv.photos||[]).length < 10 ? `<label class="img-add-btn" for="revphoto-${idx}"><span style="font-size:1.4rem">+</span><span>추가</span></label>` : ''}
        </div>
        <input type="file" id="revphoto-${idx}" accept="image/*" style="display:none" onchange="addReviewPhoto(${idx},this)">
        <div style="margin-top:.8rem">
          <button class="rev-del-btn" onclick="deleteReview(${idx})">🗑️ 후기 삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function moveReview(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= reviewsData.length) return;
  [reviewsData[idx], reviewsData[newIdx]] = [reviewsData[newIdx], reviewsData[idx]];
  await saveReviewsMeta();
  renderReviews();
}

function toggleRevCard(idx) {
  document.getElementById(`rcard-${idx}`).classList.toggle('open');
}

function setAddStar(v) {
  addStarVal = v;
  document.querySelectorAll('#addStars .star-btn').forEach(b => {
    b.classList.toggle('on', parseInt(b.dataset.v) <= v);
  });
}

function onAddPhotoChange(input) {
  if (!input.files[0]) return;
  addPhotoFile = input.files[0];
  const url = URL.createObjectURL(addPhotoFile);
  const prev = document.getElementById('addAvatarPreview');
  prev.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  document.getElementById('addPhotoRemoveBtn').style.display = 'block';
}

function clearAddPhoto() {
  addPhotoFile = null;
  document.getElementById('addPhotoInput').value = '';
  document.getElementById('addAvatarPreview').textContent = '?';
  document.getElementById('addPhotoRemoveBtn').style.display = 'none';
}

async function addReview() {
  const name = document.getElementById('addName').value.trim();
  const textKo = document.getElementById('addTextKo').value.trim();
  if (!name || !textKo) { alert('이름과 후기 내용(한국어)은 필수입니다.'); return; }

  const btn = document.getElementById('addRevBtn');
  const msg = document.getElementById('addRevMsg');
  const err = document.getElementById('addRevErr');
  btn.disabled = true; msg.classList.add('hidden'); err.classList.add('hidden');

  try {
    const id = 'rv_' + Date.now().toString(36);
    let photoUrl = '';

    // 리뷰어 사진 업로드
    if (addPhotoFile) {
      const fd = new FormData();
      fd.append('file', addPhotoFile);
      const r = await fetch(`${API_BASE}/admin/reviews/${id}/image?secret=${encodeURIComponent(adminSecret)}`, {
        method: 'POST', body: fd,
      });
      const d = await r.json();
      if (d.ok) photoUrl = d.url;
    }

    // 후기 사진 업로드 (최대 10장)
    const photos = [];
    for (const file of addReviewPhotoFiles) {
      const fd = new FormData(); fd.append('file', file);
      const r = await fetch(`${API_BASE}/admin/reviews/${id}/image?secret=${encodeURIComponent(adminSecret)}`, {
        method: 'POST', body: fd,
      });
      const d = await r.json();
      if (d.ok) photos.push({ key: d.key, url: d.url });
    }

    const newReview = {
      id,
      name,
      via: document.getElementById('addVia').value,
      rating: addStarVal,
      date: document.getElementById('addDate').value.trim(),
      textKo,
      textEn: document.getElementById('addTextEn').value.trim(),
      photoUrl,
      photos,
    };

    reviewsData.push(newReview);
    await saveReviewsMeta();

    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 3000);

    // 폼 초기화
    document.getElementById('addName').value = '';
    document.getElementById('addDate').value = '';
    document.getElementById('addTextKo').value = '';
    document.getElementById('addTextEn').value = '';
    document.getElementById('addVia').value = 'Google Maps';
    setAddStar(5);
    clearAddPhoto();
    addReviewPhotoFiles = [];
    renderAddReviewPhotos();
    renderReviews();
  } catch (e) {
    err.textContent = e.message || '오류가 발생했습니다.';
    err.classList.remove('hidden');
  } finally {
    btn.disabled = false;
  }
}

async function deleteReview(idx) {
  if (!confirm('이 후기를 삭제하시겠습니까?')) return;
  reviewsData.splice(idx, 1);
  await saveReviewsMeta();
  renderReviews();
}

async function saveReviewsMeta() {
  const r = await fetch(`${API_BASE}/admin/reviews?secret=${encodeURIComponent(adminSecret)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reviews: reviewsData }),
  });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || '저장 실패');
}
</script>
